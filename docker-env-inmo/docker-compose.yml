services:
  web:
    build: .
    container_name: ../proyecto-php-inmo
    ports:
      - "8015:80"
    volumes:
      - ../proyecto-php-inmo:/var/www/html
    depends_on:
      db:
        condition: service_started
  db:
    image: mariadb:11
    container_name: mariadb-inmo
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inmobiliaria_php
      MYSQL_USER: agente
      MYSQL_PASSWORD: casas123
    volumes:
      - ./db-inmo:/var/lib/mysql
    ports:
      - "3315:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin-inmo
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: agente
      PMA_PASSWORD: casas123
    ports:
      - "8016:80"
  browsersync:
    image: node:20-alpine
    container_name: browsersync-inmo
    working_dir: /app
    depends_on:
      - web
    volumes:
      - ../proyecto-php-inmo:/src
    command: sh -c "npm install -g browser-sync && browser-sync start --proxy 'web:80' --files '/src/**/*.*' --no-ui --host 0.0.0.0 --port 3002"
    ports:
      - "3002:3002"
